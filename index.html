<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>2 Жилийн Ойн Мэнд 💖</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease;
        }
        h1 {
            color: #e91e63;
        }
        p {
            color: #444;
            line-height: 1.6;
            margin: 20px 0;
        }
        .play-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #e91e63;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        #message {
            display: none;
            margin-top: 15px;
            color: #e91e63;
            font-weight: bold;
        }
        #countdown {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            background: #fff5f7;
            font-size: 18px;
            color: #d81b60;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="card">
    <h1>2 Жилийн Ойн Мэнд ❤️</h1>

    <p>
        Энэ хоёр жил бол миний амьдралд
чамаар дүүрэн,
хайраар дүүрэн,
аз жаргалаар дүүрэн он жилүүд байлаа.
Цаашдаа ч хамтдаа инээж,
хамтдаа хайрлая 💖
    </p>

    <!-- COUNTDOWN -->
    <div id="countdown">⏰ Бидний өдрийг хүлээж байна...</div>

    <!-- AUDIO -->
    <audio id="bgm" loop>
        <source src="vande.mp3" type="audio/mpeg">
    </audio>

    <button id="playBtn" class="play-btn" onclick="startLove()">
        🎵 Ая эхлүүлэх
    </button>

    <div id="message">
        💖 Чамайг энэ хуудсанд орж ирэхэд аялгуу эхэллээ…
    </div>
</div>

<script>
function startLove() {
    const music = document.getElementById("bgm");

    music.volume = 0.4;

    music.play().then(() => {
        console.log("🎵 Дуу амжилттай эхэллээ");
    }).catch(err => {
        alert("🎵 Хөгжим эхлээгүй. Дахин дарна уу.");
        console.error(err);
    });

    document.getElementById("playBtn").style.display = "none";
    document.getElementById("message").style.display = "block";
}

// 🎂 OЙ ХҮРТЭЛ COUNTDOWN
function getTokyoNow() {
    return new Date(
        new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" })
    );
}

// 🎂 ОЙ БОЛОХ ОГНОО (JST)
const anniversaryDate = new Date(
    "2026-04-18T00:00:00+09:00"
);

function updateCountdown() {
    const now = getTokyoNow();
    const diff = anniversaryDate - now;
    const box = document.getElementById("countdown");

    if (diff <= 0) {
        box.innerHTML = "🎉 ӨНӨӨДӨР БИДНИЙ ӨДӨР 💖 2 ЖИЛИЙН ОЙН МЭНД!";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    box.innerHTML = `
        ⏰ Бидний 2 жилийн ойд <br>
        ❤️ <b>${days}</b> өдөр
        <b>${hours}</b> цаг
        <b>${minutes}</b> минут
        <b>${seconds}</b> секунд
        үлдлээ
    `;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
